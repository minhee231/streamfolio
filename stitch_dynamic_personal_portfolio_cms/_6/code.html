<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign in - Streamfolio Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F0F0F;
        }
        .login-card {
            background-color: #1F1F1F;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom ring for inputs to match brand red */
        .input-focus-ring:focus {
            --tw-ring-color: #ff5540;
            border-color: #ff5540;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary": "#002f67",
                      "primary-fixed-dim": "#ffb4a8",
                      "inverse-primary": "#c00100",
                      "tertiary-fixed-dim": "#acc7ff",
                      "on-secondary-fixed": "#001d35",
                      "on-primary-container": "#5c0000",
                      "background": "#0F0F0F",
                      "surface": "#1F1F1F",
                      "outline": "#b18780",
                      "surface-dim": "#131313",
                      "surface-container-high": "#2a2a2a",
                      "primary-fixed": "#ffdad4",
                      "on-surface-variant": "#ebbbb4",
                      "on-surface": "#e5e2e1",
                      "on-error-container": "#ffdad6",
                      "on-primary-fixed-variant": "#930100",
                      "on-secondary-container": "#002b4c",
                      "tertiary-container": "#488fff",
                      "on-secondary": "#003257",
                      "secondary-fixed-dim": "#9ccaff",
                      "on-error": "#690005",
                      "on-secondary-fixed-variant": "#00497b",
                      "surface-variant": "#353534",
                      "surface-bright": "#3a3939",
                      "secondary-fixed": "#d0e4ff",
                      "error": "#ffb4ab",
                      "primary": "#ffb4a8",
                      "surface-tint": "#ffb4a8",
                      "surface-container": "#201f1f",
                      "outline-variant": "#603e39",
                      "on-tertiary-fixed-variant": "#004491",
                      "tertiary-fixed": "#d7e2ff",
                      "secondary-container": "#2295ed",
                      "surface-container-low": "#1c1b1b",
                      "surface-container-lowest": "#0e0e0e",
                      "on-primary-fixed": "#410000",
                      "primary-container": "#ff5540",
                      "on-primary": "#690100",
                      "on-tertiary-fixed": "#001a40",
                      "on-background": "#e5e2e1",
                      "inverse-surface": "#e5e2e1",
                      "inverse-on-surface": "#313030",
                      "surface-container-highest": "#353534",
                      "tertiary": "#acc7ff",
                      "error-container": "#93000a",
                      "secondary": "#9ccaff",
                      "on-tertiary-container": "#00285b"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "12px",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline-xl": ["Inter"],
                      "body-md": ["Inter"],
                      "body-sm": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "label-md": ["Inter"]
              },
              "fontSize": {
                      "headline-xl": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-sm": ["12px", {"lineHeight": "18px", "fontWeight": "400"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
              }
            },
          },
        }
      </script>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-container opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-tertiary-container opacity-[0.03] blur-[120px] rounded-full"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-[450px] z-10">
<div class="login-card rounded-xl p-6 md:p-10 flex flex-col items-center">
<!-- Brand Logo -->
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary-container text-4xl" data-weight="fill">play_circle</span>
<span class="text-headline-lg font-headline-lg text-on-surface">Streamfolio</span>
</div>
<!-- Header Text -->
<h1 class="text-headline-lg font-headline-lg text-on-surface mb-2">Sign in</h1>
<p class="text-body-md font-body-md text-on-surface-variant mb-8">Use your Admin Account</p>
<!-- Login Form -->
<form class="w-full space-y-4" id="loginForm">
<!-- Email Field Group -->
<div class="space-y-6" id="emailStep">
<div class="relative">
<input class="w-full bg-transparent border border-outline-variant rounded-lg px-4 py-4 text-on-surface placeholder:text-on-surface-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none" id="email" placeholder="Email or phone" required="" type="email"/>
</div>
<div class="flex flex-col gap-2">
<button class="text-secondary font-label-md text-label-md text-left w-fit hover:text-secondary-fixed-dim transition-colors" type="button">
                            Forgot email?
                        </button>
</div>
<div class="pt-4 flex flex-col gap-8">
<p class="text-body-sm font-body-sm text-on-surface-variant leading-relaxed">
                            Not your computer? Use Guest mode to sign in privately. 
                            <a class="text-secondary font-medium ml-1" href="#">Learn more</a>
</p>
<div class="flex justify-between items-center mt-6">
<button class="text-secondary font-label-md text-label-md py-2 px-4 hover:bg-surface-container transition-all rounded-lg" type="button">
                                Create account
                            </button>
<button class="bg-primary-container text-on-primary font-label-md text-label-md py-2.5 px-8 rounded-full hover:opacity-90 active:scale-95 transition-all" onclick="togglePasswordStep()" type="button">
                                Next
                            </button>
</div>
</div>
</div>
<!-- Password Field Group (Hidden initially) -->
<div class="hidden space-y-6" id="passwordStep">
<div class="flex items-center gap-2 p-1.5 border border-outline-variant rounded-full w-fit mb-6 pr-4">
<span class="material-symbols-outlined text-on-surface-variant ml-1">account_circle</span>
<span class="text-body-sm text-on-surface" id="displayEmail">admin@streamfolio.com</span>
<button class="material-symbols-outlined text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePasswordStep()" type="button">expand_more</button>
</div>
<div class="relative">
<input class="w-full bg-transparent border border-outline-variant rounded-lg px-4 py-4 text-on-surface placeholder:text-on-surface-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none" id="password" placeholder="Enter your password" type="password"/>
</div>
<div class="flex items-center gap-2">
<input class="rounded border-outline-variant bg-transparent text-primary-container focus:ring-primary-container" id="showPass" type="checkbox"/>
<label class="text-body-md text-on-surface" for="showPass">Show password</label>
</div>
<div class="flex justify-between items-center mt-10">
<button class="text-secondary font-label-md text-label-md py-2 px-4 hover:bg-surface-container transition-all rounded-lg" type="button">
                            Forgot password?
                        </button>
<button class="bg-primary-container text-on-primary font-label-md text-label-md py-2.5 px-8 rounded-full hover:opacity-90 active:scale-95 transition-all" type="submit">
                            Next
                        </button>
</div>
</div>
</form>
</div>
<!-- Language and Footer Links -->
<div class="mt-6 flex flex-wrap justify-between items-center text-label-sm font-label-sm text-on-surface-variant px-2">
<div class="flex items-center gap-2 cursor-pointer hover:text-on-surface transition-colors py-2">
<span>English (United States)</span>
<span class="material-symbols-outlined text-sm">arrow_drop_down</span>
</div>
<div class="flex gap-6">
<a class="hover:text-on-surface transition-colors py-2" href="#">Help</a>
<a class="hover:text-on-surface transition-colors py-2" href="#">Privacy</a>
<a class="hover:text-on-surface transition-colors py-2" href="#">Terms</a>
</div>
</div>
</main>
<!-- Shared Component: Footer (Hidden for focused login page but following system rules) -->
<footer class="hidden">
<div class="w-full py-6 px-4 flex flex-wrap gap-4 justify-start max-w-container-max mx-auto border-t border-outline-variant">
<span class="text-label-sm font-label-sm text-on-surface-variant">© 2024 Portfolio Stream. All rights reserved.</span>
</div>
</footer>
<script>
        function togglePasswordStep() {
            const emailInput = document.getElementById('email');
            const emailStep = document.getElementById('emailStep');
            const passwordStep = document.getElementById('passwordStep');
            const displayEmail = document.getElementById('displayEmail');

            if (emailStep.classList.contains('hidden')) {
                // Moving back to email
                emailStep.classList.remove('hidden');
                passwordStep.classList.add('hidden');
            } else {
                // Moving to password
                if (emailInput.value.trim() !== '') {
                    displayEmail.textContent = emailInput.value;
                }
                emailStep.classList.add('hidden');
                passwordStep.classList.remove('hidden');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Final submit logic here
            alert('Admin access requested for: ' + document.getElementById('email').value);
        });

        // Simple input interaction visual
        const inputs = document.querySelectorAll('input[type="email"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
